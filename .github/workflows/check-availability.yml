name: Check Disneyland Availability

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - run: python check_availability.py
        env:
          WEBHOOK_ERIC: ${{ secrets.WEBHOOK_ERIC }}
          # Add one line per subscriber: WEBHOOK_NAME: ${{ secrets.WEBHOOK_NAME }}
